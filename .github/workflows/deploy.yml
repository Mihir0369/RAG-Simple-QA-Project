# ==================================================
# RAG Q&A System - CD Pipeline (ECR + ECS)
# ==================================================

name: CD - Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: rag-qa-system
  ECS_CLUSTER: default
  ECS_SERVICE: rag-qa-system-9e9e
  ECS_SERVICE_ARN: arn:aws:ecs:us-east-2:476140239062:service/default/rag-qa-system-9e9e
  ECS_TASK_DEFINITION_FILE: task-definition.json
  CONTAINER_NAME: rag-qa-container
  APP_HEALTHCHECK_URL: https://ra-5e97c2223950411e82358e37609556ea.ecs.us-east-2.on.aws/health

jobs:
  # ============================================
  # Build and Push to ECR
  # ============================================
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build-image.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build Docker image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

          # Push both tags
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Output the image URI
          echo "image_uri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

          echo "✅ Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  # ============================================
  # Deploy to ECS
  # ============================================
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current ECS task definition
        run: |
          SERVICE_DESC=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_ARN }}" \
            --output json)

          FAILURE_REASON=$(echo "$SERVICE_DESC" | jq -r '.failures[0].reason // empty')
          FAILURE_ARN=$(echo "$SERVICE_DESC" | jq -r '.failures[0].arn // empty')
          if [ -n "$FAILURE_REASON" ]; then
            echo "ECS describe-services failure: $FAILURE_REASON ($FAILURE_ARN)"
            echo "Check ECS_CLUSTER and ECS_SERVICE_ARN values."
            exit 1
          fi

          TASK_DEF_ARN=$(echo "$SERVICE_DESC" | jq -r '.services[0].taskDefinition // empty')
          if [ -z "$TASK_DEF_ARN" ] || [ "$TASK_DEF_ARN" = "None" ]; then
            echo "Could not resolve task definition ARN from ECS service."
            echo "Check that service exists and has an active task definition."
            exit 1
          fi

          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --query "taskDefinition" \
            --output json > raw-task-definition.json

          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' raw-task-definition.json > "${{ env.ECS_TASK_DEFINITION_FILE }}"

      - name: Render ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION_FILE }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build-and-push.outputs.image_uri }}
          environment-variables: |
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            QDRANT_URL=${{ secrets.QDRANT_URL }}
            QDRANT_API_KEY=${{ secrets.QDRANT_API_KEY }}
            LOG_LEVEL=INFO
            LANGSMITH_TRACING=true
            LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
            LANGSMITH_PROJECT=rag-qa-production
            LANGSMITH_ENDPOINT=https://eu.api.smith.langchain.com

      - name: Deploy ECS task definition
        id: deploy-ecs
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Output deployment details
        run: |
          echo "🚀 Deployment successful!"
          echo "Cluster: ${{ env.ECS_CLUSTER }}"
          echo "Service: ${{ env.ECS_SERVICE }}"
          echo "Task Definition: ${{ steps.task-def.outputs.task-definition }}"

      - name: Health Check
        run: |
          sleep 30
          echo "Checking health endpoint..."
          curl -f "${{ env.APP_HEALTHCHECK_URL }}" || echo "Health check pending..."
