name: CD - Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: rag-qa-system
  CONTAINER_NAME: rag-qa-system
  HOST_PORT: "8000"
  CONTAINER_PORT: "8000"
  APP_HEALTHCHECK_PATH: /health

jobs:
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image metadata
        id: meta
        run: |
          echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}" \
            -t "${{ env.IMAGE_NAME }}:latest" \
            .

      - name: Export image tarball
        run: |
          docker save "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}" | gzip > rag-qa-image.tar.gz
          ls -lh rag-qa-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: rag-qa-image
          path: rag-qa-image.tar.gz
          if-no-files-found: error
          retention-days: 1

  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: rag-qa-image

      - name: Upload image tarball to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: rag-qa-image.tar.gz
          target: /tmp

      - name: Deploy container on EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ needs.build-image.outputs.image_tag }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HOST_PORT: ${{ env.HOST_PORT }}
          CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: rag-qa-production
          LANGSMITH_ENDPOINT: https://eu.api.smith.langchain.com
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: IMAGE_NAME,IMAGE_TAG,CONTAINER_NAME,HOST_PORT,CONTAINER_PORT,OPENAI_API_KEY,QDRANT_URL,QDRANT_API_KEY,LANGSMITH_API_KEY,LANGSMITH_PROJECT,LANGSMITH_ENDPOINT
          script: |
            set -euo pipefail

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker is not installed on EC2."
              exit 1
            fi

            if [ ! -f /tmp/rag-qa-image.tar.gz ]; then
              echo "Docker image artifact not found at /tmp/rag-qa-image.tar.gz"
              exit 1
            fi

            gunzip -c /tmp/rag-qa-image.tar.gz | docker load
            docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${IMAGE_NAME}:latest"

            if docker ps -a --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}$"; then
              docker stop "$CONTAINER_NAME" || true
              docker rm "$CONTAINER_NAME" || true
            fi

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p "${HOST_PORT}:${CONTAINER_PORT}" \
              -e OPENAI_API_KEY="$OPENAI_API_KEY" \
              -e QDRANT_URL="$QDRANT_URL" \
              -e QDRANT_API_KEY="$QDRANT_API_KEY" \
              -e LANGSMITH_TRACING=true \
              -e LANGSMITH_API_KEY="$LANGSMITH_API_KEY" \
              -e LANGSMITH_PROJECT="$LANGSMITH_PROJECT" \
              -e LANGSMITH_ENDPOINT="$LANGSMITH_ENDPOINT" \
              "${IMAGE_NAME}:${IMAGE_TAG}"

            echo "Container status:"
            docker ps --filter "name=${CONTAINER_NAME}" --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"
            echo "Recent logs:"
            docker logs --tail 30 "$CONTAINER_NAME" || true

            rm -f /tmp/rag-qa-image.tar.gz

      - name: Verify health endpoint
        run: |
          echo "Waiting for service to start..."
          sleep 20

          for attempt in {1..6}; do
            if curl -fsS "http://${{ secrets.EC2_HOST }}:${{ env.HOST_PORT }}${{ env.APP_HEALTHCHECK_PATH }}" >/dev/null; then
              echo "Deployment health check passed."
              exit 0
            fi
            echo "Health check attempt ${attempt}/6 failed. Retrying..."
            sleep 10
          done

          echo "Health check failed after retries."
          exit 1